name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  contract:
    name: Smart Contract (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Rust with wasm target
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      # Cache cargo dependencies; skip if missing
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          fail-on-cache-miss: false

      # Format & lint
      - name: Format check
        run: cd contracts/escrow_contract && cargo fmt -- --check
      - name: Clippy
        run: cd contracts/escrow_contract && cargo clippy -- -D warnings

      # Run tests
      - name: Test
        run: cd contracts/escrow_contract && cargo test

      # Build WASM
      - name: Build WASM
        run: cd contracts/escrow_contract && cargo build --release --target wasm32-unknown-unknown

  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Cache npm dependencies at root for entire monorepo
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: false

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: cd backend && npm run lint

      - name: Test
        run: cd backend && npm test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Cache npm dependencies at root for entire monorepo
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: false

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

  bundle-analysis:
    name: Frontend Bundle Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: false

      - name: Install dependencies
        run: npm ci

      # Build with analyzer enabled — generates HTML reports in frontend/.next/analyze/
      - name: Build with bundle analyzer
        run: cd frontend && npm run analyze
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      # Upload the HTML analyzer reports as a build artifact
      - name: Upload analyzer reports
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analyzer-report-${{ github.sha }}
          path: frontend/.next/analyze/
          retention-days: 90

      # Capture a size snapshot and save it; restore previous history first
      - name: Restore bundle stats history
        uses: actions/cache@v4
        with:
          path: bundle-stats.json
          key: bundle-stats-${{ github.ref_name }}
          restore-keys: bundle-stats-

      - name: Record bundle snapshot
        run: node scripts/bundle-report.js --save --trend
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      # Persist updated history for future runs
      - name: Save bundle stats history
        uses: actions/cache/save@v4
        with:
          path: bundle-stats.json
          key: bundle-stats-${{ github.ref_name }}-${{ github.sha }}

      # Upload the JSON history as an artifact too
      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats-${{ github.sha }}
          path: bundle-stats.json
          retention-days: 90
